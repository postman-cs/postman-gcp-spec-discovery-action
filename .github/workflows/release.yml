name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      npm_publish: ${{ steps.release_tag.outputs.npm_publish }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/setup-go@v7
        with:
          go-version: '1.24'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm test
      - run: npm run typecheck
      - run: npm run verify:dist
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
      - name: Run actionlint
        run: |
          ACTIONLINT_BIN="$(go env GOPATH)/bin/actionlint"
          "$ACTIONLINT_BIN"
      - name: Verify release tag matches package version
        id: release_tag
        run: |
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::Release workflow must run from a v* tag; got $GITHUB_REF"
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          git fetch origin main --no-tags
          TAG_COMMIT=$(git rev-parse 'HEAD^{commit}')
          MAIN_COMMIT=$(git rev-parse 'origin/main^{commit}')
          if [ "$TAG_COMMIT" != "$MAIN_COMMIT" ]; then
            echo "::error::Release tag commit $TAG_COMMIT differs from protected origin/main $MAIN_COMMIT"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR _ <<< "$PKG_VERSION"
          # npm publishes ONLY from the exact immutable package-version tag.
          if [ "$TAG_VERSION" = "$PKG_VERSION" ]; then
            echo "npm_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Rolling aliases (v1, v1.0) update the action channel and never publish npm.
          if [ "$TAG_VERSION" = "$MAJOR" ] || [ "$TAG_VERSION" = "$MAJOR.$MINOR" ]; then
            echo "npm_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$TAG_VERSION is a rolling alias for package version $PKG_VERSION; skipping npm publish."
            exit 0
          fi
          echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION; expected v$PKG_VERSION, v$MAJOR.$MINOR, or v$MAJOR"
          exit 1
      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
      - uses: actions/setup-node@v7
        if: steps.release_tag.outputs.npm_publish == 'true'
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Check npm package version
        id: npm_package
        if: steps.release_tag.outputs.npm_publish == 'true'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$PKG_NAME@$PKG_VERSION is already published; skipping npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.release_tag.outputs.npm_publish == 'true' && steps.npm_package.outputs.already_published != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Attach npm tarball to release
        run: |
          npm pack
          mv ./*.tgz release.tgz
      - name: Upload tarball
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: release.tgz

  advance-rolling-aliases:
    # Keep rolling major/minor aliases (e.g. v1 and v1.0) pointing at the newest
    # published release so pinned action consumers pick it up automatically.
    # GITHUB_TOKEN pushes do not re-trigger workflows, so moving the alias
    # here cannot recurse into another Release run.
    needs: release
    if: ${{ needs.release.outputs.npm_publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Force-move rolling major and minor alias tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="v${VERSION%%.*}"
          IFS='.' read -r MAJOR_NUMBER MINOR_NUMBER _ <<< "$VERSION"
          MINOR="v${MAJOR_NUMBER}.${MINOR_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          COMMIT="$(git rev-parse "HEAD^{commit}")"
          for ALIAS in "$MAJOR" "$MINOR"; do
            git tag -fa "$ALIAS" -m "Rolling $ALIAS alias -> $GITHUB_REF_NAME" "$COMMIT"
            git push origin "$ALIAS" --force
          done
