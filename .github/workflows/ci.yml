name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so commitlint can lint the PR commit range.
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11 "$RUNNER_TEMP"
          echo "ACTIONLINT_BIN=$RUNNER_TEMP/actionlint" >> "$GITHUB_ENV"
      # Bundle once before fan-out so pack tests and the dist assert only read
      # dist/. Typecheck stays in the fan-out so it runs exactly once.
      - run: npm run bundle
      # Keep at most two checks active on the two-vCPU runner. Failures aggregate
      # under ::group:: logs so one pass still shows every result.
      - name: Run gates
        run: |
          set -uo pipefail
          declare -A pid=()
          declare -A result=()
          declare -a names=()
          MAX_PARALLEL_GATES=2
          finish_one() {
            local finished_pid status n
            if wait -n -p finished_pid "${pid[@]}"; then status=0; else status=$?; fi
            for n in "${!pid[@]}"; do
              if [ "${pid[$n]}" = "$finished_pid" ]; then
                result[$n]=$status
                unset 'pid[$n]'
                return
              fi
            done
          }
          run() {
            while [ "${#pid[@]}" -ge "$MAX_PARALLEL_GATES" ]; do finish_one; done
            local n=$1; shift
            names+=("$n")
            ( "$@" ) >"$n.log" 2>&1 & pid[$n]=$!
          }

          run lint       npm run lint
          run typecheck  npm run typecheck
          run test       npm test
          run dist       npm run verify:dist:assert
          run actionlint "$ACTIONLINT_BIN"
          run docs       node scripts/render-action-tables.mjs --check
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            run commitlint npx --no-install commitlint \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}"
          fi

          while [ "${#pid[@]}" -gt 0 ]; do finish_one; done
          fail=0
          for n in "${names[@]}"; do
            if [ "${result[$n]}" -eq 0 ]; then echo "gate:$n=pass"; else echo "gate:$n=fail"; fail=1; fi
          done
          for n in "${names[@]}"; do
            echo "::group::$n"; cat "$n.log"; echo "::endgroup::"
          done
          exit $fail
      - name: Upload expected dist on mismatch
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: expected-dist
          path: dist/

  windows:
    name: Windows gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run bundle
      - name: Run gates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $MAX_PARALLEL_GATES=2
          $gates = @{
            lint = 'npm run lint'
            test = 'npm test'
            typecheck = 'npm run typecheck'
            dist = 'npm run verify:dist:assert'
          }
          $running = @{}
          $results = @{}
          foreach ($name in $gates.Keys) {
            while ($running.Count -ge $MAX_PARALLEL_GATES) {
              $job = Wait-Job -Job $running.Values -Any
              $results[$job.Name] = $job.State -eq 'Completed' -and $job.ChildJobs[0].JobStateInfo.Reason -eq $null
              Receive-Job $job
              Remove-Job $job
              $running.Remove($job.Name)
            }
            $running[$name] = Start-Job -Name $name -ScriptBlock { param($command); Invoke-Expression $command; if ($LASTEXITCODE -ne 0) { throw "gate exited $LASTEXITCODE" } } -ArgumentList $gates[$name]
          }
          while ($running.Count -gt 0) {
            $job = Wait-Job -Job $running.Values -Any
            $results[$job.Name] = $job.State -eq 'Completed' -and $job.ChildJobs[0].JobStateInfo.Reason -eq $null
            Receive-Job $job
            Remove-Job $job
            $running.Remove($job.Name)
          }
          $failed = $false
          foreach ($name in $gates.Keys) { if ($results[$name]) { Write-Output "gate:$name=pass" } else { Write-Output "gate:$name=fail"; $failed = $true } }
          if ($failed) { exit 1 }
